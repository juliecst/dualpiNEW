# /etc/samba/smb.conf
# Timelapse Art Installation — Pi 1 Samba Shares

[global]
   workgroup = TIMELAPSE
   server string = Timelapse Camera Pi
   security = user
   map to guest = Bad Password
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   server role = standalone server
   obey pam restrictions = yes
   unix password sync = yes
   pam password change = yes
   min protocol = SMB2

[timelapse]
   comment = Timelapse Images (read-only)
   path = /data/timelapse
   browseable = yes
   read only = yes
   guest ok = yes
   force user = pi
   create mask = 0644
   directory mask = 0755

[config]
   comment = Configuration (writable)
   path = /data
   browseable = yes
   read only = no
   guest ok = yes
   force user = pi
   create mask = 0644
   directory mask = 0755
   valid users = guest,nobody
   write list = guest,nobody
