# /etc/hostapd/hostapd.conf
# Timelapse Art Installation — Pi 1 Access Point
# SSID and password are overwritten by setup.sh from /data/config.json

interface=wlan0
driver=nl80211
ssid=timelapse-ap
hw_mode=g
channel=7
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=changeme2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
