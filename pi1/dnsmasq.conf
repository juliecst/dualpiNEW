# Pi1 — dnsmasq DHCP + DNS Configuration
# Provides DHCP on the private AP network (192.168.50.0/24)

interface=wlan0
bind-interfaces
dhcp-range=192.168.50.10,192.168.50.50,255.255.255.0,24h
dhcp-option=option:router,192.168.50.1
dhcp-option=option:dns-server,192.168.50.1

# Captive portal: resolve all DNS queries to Pi1 (air-gapped, no internet)
address=/#/192.168.50.1

# Do not forward DNS queries upstream
no-resolv
no-poll
