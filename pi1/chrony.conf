# /etc/chrony/chrony.conf
# Timelapse Art Installation — Pi 1 as local NTP server
# No internet source; serve its own hardware clock to the local network.

# Use the system clock as the only reference
local stratum 8

# Allow NTP clients on the local AP subnet
allow 192.168.50.0/24

# Record the rate at which the system clock gains/losses time
driftfile /var/lib/chrony/chrony.drift

# Don't try to reach any external NTP servers
# (no server/pool directives)

# Log statistics
logdir /var/log/chrony

# Step the clock on startup if offset > 1 second
makestep 1.0 3

# Enable RTC synchronisation
rtcsync
