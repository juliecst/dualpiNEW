# Pi1 — hostapd WiFi Access Point Configuration
# Pi1 is a Raspberry Pi 3 (2.4 GHz 802.11n only).
# SSID and passphrase are overwritten by setup.sh from config.yaml

interface=wlan0
driver=nl80211
ssid=timelapse-ap
hw_mode=g
channel=7
ieee80211n=1
wmm_enabled=1
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=changeme2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
