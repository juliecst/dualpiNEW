# /etc/dnsmasq.conf
# Timelapse Art Installation — Pi 1 DHCP + DNS

interface=wlan0
bind-interfaces
dhcp-range=192.168.50.10,192.168.50.50,255.255.255.0,24h
# Static lease for Pi 2
dhcp-host=*,192.168.50.20
# Redirect all DNS to Pi 1 (captive portal)
address=/#/192.168.50.1
# Disable DNS forwarding (no internet)
no-resolv
no-poll
