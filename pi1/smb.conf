# /etc/samba/smb.conf
# Timelapse Art Installation — Pi 1 Samba Shares
#
# Pi 2 mounts //192.168.50.1/timelapse via CIFS guest access.
# All shares use guest authentication — no passwords required.

[global]
   workgroup = TIMELAPSE
   server string = Timelapse Camera Pi
   security = user
   map to guest = Bad Password
   guest account = nobody
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   server role = standalone server
   min protocol = SMB2
   # Allow NTLMv1 for broadest client compatibility on isolated network.
   # WARNING: NTLMv1 is cryptographically weak — this is ONLY safe because
   # this network is air-gapped with no internet connection.  Never enable
   # this on an internet-connected Samba server.
   ntlm auth = ntlmv1-permitted
   # Disable unused features
   load printers = no
   printing = bsd
   printcap name = /dev/null

[timelapse]
   comment = Timelapse Images (read-only)
   path = /data/timelapse
   browseable = yes
   read only = yes
   guest ok = yes
   guest only = yes
   force user = pi
   create mask = 0644
   directory mask = 0755

[config]
   comment = Configuration (writable)
   path = /data
   browseable = yes
   read only = no
   guest ok = yes
   guest only = yes
   force user = pi
   create mask = 0644
   directory mask = 0755
